<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 网页游戏中心</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.4.0/css/all.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-gamepad"></i> 网页游戏中心
            </a>
        </div>
    </nav>

    <div class="login-container">
        <h2 class="login-title">
            <i class="fas fa-sign-in-alt"></i> 登录
        </h2>

        <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">登录</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">注册</button>
            </li>
        </ul>

        <!-- 登录表单 -->
        <div class="tab-content">
            <div class="tab-pane fade show active" id="login" role="tabpanel">
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="loginUsername" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="loginUsername" placeholder="输入用户名" required>
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">密码</label>
                        <input type="password" class="form-control" id="loginPassword" placeholder="输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">登录</button>
                </form>
            </div>

            <!-- 注册表单 -->
            <div class="tab-pane fade" id="register" role="tabpanel">
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="registerUsername" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="registerUsername" placeholder="3-20个字符" required>
                        <small class="form-text text-muted" id="usernameError"></small>
                    </div>
                    <div class="mb-3">
                        <label for="registerEmail" class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="registerEmail" placeholder="输入邮箱地址" required>
                        <small class="form-text text-muted" id="emailError"></small>
                    </div>
                    <div class="mb-3">
                        <label for="registerPassword" class="form-label">密码</label>
                        <input type="password" class="form-control" id="registerPassword" placeholder="至少6个字符" required>
                        <small class="form-text text-muted" id="passwordError"></small>
                    </div>
                    <div class="mb-3">
                        <label for="registerConfirm" class="form-label">确认密码</label>
                        <input type="password" class="form-control" id="registerConfirm" placeholder="再次输入密码" required>
                        <small class="form-text text-muted" id="confirmError"></small>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">注册</button>
                </form>
            </div>
        </div>

        <hr>
        <p class="text-center text-muted mb-0">
            <a href="/">返回首页</a>
        </p>
    </div>

    <!-- 脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/ui.js"></script>
    <script>
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            try {
                setButtonLoading(submitBtn, true);
                submitBtn.dataset.originalText = '登录';
                
                const result = await api.login(username, password);
                api.setToken(result.access_token);
                
                showSuccess('登录成功！');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
                
            } catch (error) {
                showError(error.message);
            } finally {
                setButtonLoading(submitBtn, false);
            }
        });

        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            // 验证
            if (!validateUsername(username)) {
                showError('用户名必须是3-20个字符');
                return;
            }
            if (!validateEmail(email)) {
                showError('邮箱格式不正确');
                return;
            }
            if (!validatePassword(password)) {
                showError('密码至少6个字符');
                return;
            }
            if (password !== confirm) {
                showError('两次输入的密码不一致');
                return;
            }
            
            try {
                setButtonLoading(submitBtn, true);
                submitBtn.dataset.originalText = '注册';
                
                const result = await api.register(username, email, password);
                api.setToken(result.access_token);
                
                showSuccess('注册成功！');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
                
            } catch (error) {
                showError(error.message);
            } finally {
                setButtonLoading(submitBtn, false);
            }
        });
    </script>
</body>
</html>
