<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏中心</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.4.0/css/all.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-gamepad"></i> 游戏中心
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/" id="homeLink">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/leaderboard.html" id="leaderboardLink">排行榜</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard.html" id="dashboardLink">我的信息</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings.html" id="settingsLink"><i class="fas fa-cog"></i> 设置</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm" id="logoutBtn" style="display:none;">登出</button>
                        <a class="nav-link" href="/login.html" id="loginLink">登入</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <main class="container-fluid py-5">
        <!-- Pygame 运行状态栏 -->
        <div id="runningStatusBar" class="running-status-bar" style="display:none;"></div>

        <!-- 欢迎区域 -->
        <section class="welcome-section mb-5">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="display-4 fw-bold">欢迎来到游戏中心</h1>
                    <p class="lead">探索各种精彩游戏，与全球玩家竞争排名！</p>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary btn-lg" id="startPlayingBtn">开始游戏</button>
                        <a href="/leaderboard.html" class="btn btn-outline-primary btn-lg">查看排行榜</a>
                    </div>
                </div>
                <div class="col-md-4 text-center">
                    <i class="fas fa-trophy" style="font-size: 100px; color: #ffc107;"></i>
                </div>
            </div>
        </section>

        <!-- 用户统计信息 -->
        <section id="userStatsSection" class="mb-5" style="display:none;">
            <div class="row g-4 mb-5">
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #007bff;">
                            <i class="fas fa-star"></i>
                        </div>
                        <div class="stat-content">
                            <div class="stat-value" id="totalScore">0</div>
                            <div class="stat-label">总积分</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #28a745;">
                            <i class="fas fa-gamepad"></i>
                        </div>
                        <div class="stat-content">
                            <div class="stat-value" id="gamesPlayed">0</div>
                            <div class="stat-label">游戏次数</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #ffc107;">
                            <i class="fas fa-fire"></i>
                        </div>
                        <div class="stat-content">
                            <div class="stat-value" id="userRank">-</div>
                            <div class="stat-label">我的排名</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #dc3545;">
                            <i class="fas fa-crown"></i>
                        </div>
                        <div class="stat-content">
                            <div class="stat-value" id="maxScore">0</div>
                            <div class="stat-label">最高分</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 游戏分类 -->
        <section class="games-section">
            <!-- 游戏类型标签页 -->
            <div class="game-tabs mb-4">
                <button class="tab-btn active" data-tab="web" onclick="switchTab('web')">
                    <i class="fas fa-globe"></i> 网页游戏
                </button>
                <button class="tab-btn" data-tab="pygame" onclick="switchTab('pygame')">
                    <i class="fas fa-desktop"></i> 本地游戏
                </button>
                <button class="tab-btn" data-tab="all" onclick="switchTab('all')">
                    <i class="fas fa-th"></i> 全部游戏
                </button>
            </div>

            <!-- 网页游戏 -->
            <div id="webGamesSection">
                <h2 class="mb-4">游戏分类</h2>
                <div id="categoriesContainer" class="row g-4"></div>
            </div>

            <!-- Pygame 本地游戏 -->
            <div id="pygameGamesSection" style="display:none;">
                <h2 class="mb-4">本地 Pygame 游戏</h2>
                <div id="pygameGamesContainer"></div>
            </div>
        </section>
    </main>

    <!-- 游戏选择模态框 -->
    <div class="modal fade" id="gameSelectionModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">选择游戏</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="gamesListContainer" class="row g-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2024 网页游戏中心. 所有权利保留。</p>
        </div>
    </footer>

    <!-- 脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/pygame.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
