<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 - 网页游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #111;
        }

        #gameContainer {
            position: relative;
            width: 400px;
            height: 400px;
            background: #000;
            border: 3px solid #FFF;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 14px;
            z-index: 100;
            font-family: Arial, sans-serif;
        }

        .ui-item {
            margin-bottom: 10px;
        }

        .controls {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="ui">
            <div class="ui-item">分数: <span id="score">0</span></div>
            <div class="ui-item">生命: <span id="lives">3</span></div>
            <div class="ui-item">敌人: <span id="enemies">0</span></div>
        </div>
        <div class="controls">
            ↑↓←→ 移动 | Space 射击
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
