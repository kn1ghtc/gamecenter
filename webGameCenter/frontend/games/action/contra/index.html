<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魂斗罗 - 网页游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #111;
            font-family: Arial, sans-serif;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border: 3px solid #333;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #player {
            position: absolute;
            width: 30px;
            height: 40px;
            background: #FF0000;
            border: 2px solid #8B0000;
            left: 50px;
            bottom: 100px;
            z-index: 10;
        }

        .enemy {
            position: absolute;
            width: 30px;
            height: 35px;
            background: #00AA00;
            border: 2px solid #005500;
            z-index: 9;
        }

        .bullet {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #FFFF00;
            border-radius: 50%;
            z-index: 8;
        }

        .platform {
            position: absolute;
            background: #8B4513;
            border: 2px solid #654321;
        }

        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        #lives {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        #level {
            position: absolute;
            top: 50px;
            left: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        #gameOver {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-size: 30px;
            z-index: 200;
            display: none;
        }

        #gameOver h1 {
            margin-bottom: 20px;
            color: #FFD700;
        }

        .controls {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">分数: 0</div>
        <div id="lives">生命: 3</div>
        <div id="level">关卡: 1</div>
        <div id="player"></div>
        <div id="gameOver"></div>
        <div class="controls">
            ←→ 移动 | 空格 射击 | W 跳跃
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
