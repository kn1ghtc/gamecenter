<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - 网页游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #faf8ef; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #gameContainer { text-align: center; }
        h1 { color: #776e65; font-size: 36px; margin-bottom: 10px; }
        .score-container { display: flex; gap: 20px; margin-bottom: 20px; justify-content: center; }
        .score-box { background: #bbada0; color: white; padding: 15px 25px; border-radius: 5px; }
        .score-box label { font-size: 12px; }
        .score-box div { font-size: 24px; font-weight: bold; }
        #gameGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 340px; height: 340px; background: #bbada0; padding: 10px; margin: 0 auto 20px; border-radius: 5px; }
        .tile { background: #cdc1b4; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: bold; }
        .tile[data-value="2"] { background: #eee4da; color: #776e65; }
        .tile[data-value="4"] { background: #ede0c8; color: #776e65; }
        .tile[data-value="8"] { background: #f2b179; color: white; }
        .tile[data-value="16"] { background: #f59563; color: white; }
        .tile[data-value="32"] { background: #f67c5f; color: white; }
        .tile[data-value="64"] { background: #f65e3b; color: white; }
        .tile[data-value="128"] { background: #edcf72; color: #f9f6f2; font-size: 30px; }
        .tile[data-value="256"] { background: #edcc61; color: #f9f6f2; font-size: 30px; }
        .tile[data-value="512"] { background: #edc850; color: #f9f6f2; font-size: 30px; }
        .tile[data-value="1024"] { background: #edc53f; color: #f9f6f2; font-size: 25px; }
        .tile[data-value="2048"] { background: #edc22e; color: #f9f6f2; font-size: 25px; }
        .controls { font-size: 14px; color: #776e65; margin-top: 20px; }
        button { background: #8f7a66; color: white; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; font-size: 16px; }
        button:hover { background: #9f8a76; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1>2048</h1>
        <div class="score-container">
            <div class="score-box">
                <label>分数</label>
                <div id="score">0</div>
            </div>
            <div class="score-box">
                <label>最高分</label>
                <div id="bestScore">0</div>
            </div>
        </div>
        <div id="gameGrid"></div>
        <button onclick="location.reload()">重新开始</button>
        <div class="controls">
            方向键或 WASD 移动 | 合并相同的数字达到2048
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
