<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - Tetris Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            font-family: Arial, sans-serif;
            color: #fff;
        }
        
        .game-container {
            text-align: center;
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .game-content {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        
        #gameCanvas {
            border: 3px solid #fff;
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        
        .game-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            min-width: 200px;
            text-align: left;
        }
        
        .info-item {
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .info-label {
            color: #ffd700;
            font-weight: bold;
        }
        
        .info-value {
            font-size: 24px;
            color: #fff;
            font-weight: bold;
        }
        
        #nextPieceCanvas {
            border: 2px solid #fff;
            background-color: #000;
            display: block;
            margin-top: 10px;
            width: 100%;
        }
        
        .controls {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .btn {
            background-color: #e74c3c;
            color: #fff;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🧩 俄罗斯方块 Tetris 🧩</h1>
        
        <div class="game-content">
            <canvas id="gameCanvas" width="240" height="400"></canvas>
            
            <div class="game-info">
                <div class="info-item">
                    <div class="info-label">得分</div>
                    <div class="info-value" id="score">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">等级</div>
                    <div class="info-value" id="level">1</div>
                </div>
                <div class="info-item">
                    <div class="info-label">消除行</div>
                    <div class="info-value" id="lines">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">下一方块</div>
                    <canvas id="nextPieceCanvas" width="120" height="80"></canvas>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <p>🎮 <strong>操作方式:</strong></p>
            <p>← → 左右移动 | ↓ 加速下降 | ↑/Z 旋转</p>
            <p>空格 快速下落 | P 暂停 | R 重新开始</p>
        </div>
        
        <button class="btn" onclick="location.reload()">🔄 重新开始</button>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
