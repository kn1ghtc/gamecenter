<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷 - Minesweeper Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            font-family: Arial, sans-serif;
            color: #fff;
        }
        
        .game-container {
            text-align: center;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #gameBoard {
            display: inline-grid;
            gap: 0;
            margin: 20px auto;
            background-color: #bdc3c7;
            padding: 5px;
            border: 3px solid #34495e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border-radius: 5px;
        }
        
        .cell {
            width: 30px;
            height: 30px;
            background-color: #ecf0f1;
            border: 2px solid;
            border-top-color: #fff;
            border-left-color: #fff;
            border-right-color: #bdc3c7;
            border-bottom-color: #bdc3c7;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            user-select: none;
            transition: all 0.1s;
        }
        
        .cell:hover {
            background-color: #d5dbdb;
        }
        
        .cell.revealed {
            border-top-color: #bdc3c7;
            border-left-color: #bdc3c7;
            border-right-color: #ecf0f1;
            border-bottom-color: #ecf0f1;
            background-color: #d5dbdb;
            cursor: default;
        }
        
        .cell.flag::after {
            content: '🚩';
            font-size: 16px;
        }
        
        .cell.mine::after {
            content: '💣';
            font-size: 16px;
        }
        
        .cell.empty {
            color: #95a5a6;
        }
        
        .cell.number {
            color: #2c3e50;
            font-weight: bold;
        }
        
        .game-info {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .info-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border: 1px solid #fff;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
        }
        
        .controls {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .btn {
            background-color: #9b59b6;
            color: #fff;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background-color: #8e44ad;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>💣 扫雷 Minesweeper 💣</h1>
        
        <div class="game-info">
            <div class="info-item">⏱️ 时间: <span id="timer">0</span>s</div>
            <div class="info-item">💣 剩余: <span id="mines">10</span></div>
            <div class="info-item">🚩 旗子: <span id="flags">0</span></div>
        </div>
        
        <div id="gameBoard"></div>
        
        <div class="controls">
            <p>🎮 <strong>操作方式:</strong></p>
            <p>左键 翻开方块 | 右键 标记地雷</p>
            <p>翻开所有安全方块即可获胜</p>
        </div>
        
        <button class="btn" onclick="location.reload()">🔄 新游戏</button>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
