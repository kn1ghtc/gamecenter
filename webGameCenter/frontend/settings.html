<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏设置 - 游戏中心</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.4.0/css/all.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-gamepad"></i> 游戏中心
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/settings.html">设置</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="settings-container">
            <h2 class="mb-4"><i class="fas fa-cog"></i> 游戏设置</h2>

            <!-- 全局设置 -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-globe"></i> 全局设置</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="volumeSlider" class="form-label">
                            音量: <span id="volumeValue">80</span>%
                        </label>
                        <input type="range" class="form-range" id="volumeSlider"
                               min="0" max="100" value="80"
                               oninput="document.getElementById('volumeValue').textContent=this.value">
                    </div>
                    <div class="mb-3">
                        <label for="resolutionSelect" class="form-label">分辨率</label>
                        <select class="form-select" id="resolutionSelect">
                            <option value="1024x768">1024 x 768</option>
                            <option value="1280x720" selected>1280 x 720 (HD)</option>
                            <option value="1920x1080">1920 x 1080 (FHD)</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" onclick="saveGlobalSettings()">
                            <i class="fas fa-save"></i> 保存设置
                        </button>
                        <button class="btn btn-outline-secondary" onclick="loadGlobalSettings()">
                            <i class="fas fa-undo"></i> 重置
                        </button>
                    </div>
                </div>
            </div>

            <!-- 游戏专属设置 -->
            <div class="card">
                <div class="card-header bg-secondary text-white">
                    <h5 class="mb-0"><i class="fas fa-sliders-h"></i> 游戏专属设置</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="gameSelect" class="form-label">选择游戏</label>
                        <select class="form-select" id="gameSelect" onchange="loadGameSettings(this.value)">
                            <option value="">-- 选择游戏 --</option>
                        </select>
                    </div>
                    <div id="gameSettingsPanel" style="display:none;">
                        <div class="mb-3">
                            <label for="gameVolume" class="form-label">
                                游戏音量: <span id="gameVolumeValue">80</span>%
                            </label>
                            <input type="range" class="form-range" id="gameVolume"
                                   min="0" max="100" value="80"
                                   oninput="document.getElementById('gameVolumeValue').textContent=this.value">
                        </div>
                        <button class="btn btn-primary" onclick="saveCurrentGameSettings()">
                            <i class="fas fa-save"></i> 保存游戏设置
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2024 游戏中心. 所有权利保留。</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /* ── 全局设置 ── */
        async function loadGlobalSettings() {
            try {
                const resp = await fetch('/api/settings');
                const data = await resp.json();
                if (data.volume) {
                    document.getElementById('volumeSlider').value = data.volume;
                    document.getElementById('volumeValue').textContent = data.volume;
                }
                if (data.resolution) {
                    document.getElementById('resolutionSelect').value = data.resolution;
                }
            } catch (e) { console.error('load settings error:', e); }
        }

        async function saveGlobalSettings() {
            const volume = document.getElementById('volumeSlider').value;
            const resolution = document.getElementById('resolutionSelect').value;
            try {
                const resp = await fetch('/api/settings', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({volume, resolution})
                });
                if (resp.ok) alert('设置已保存');
            } catch (e) { console.error('save settings error:', e); }
        }

        /* ── 游戏列表 ── */
        async function loadGameList() {
            try {
                const resp = await fetch('/api/pygame/games');
                const data = await resp.json();
                const select = document.getElementById('gameSelect');
                (data.games || []).forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id;
                    opt.textContent = g.name;
                    select.appendChild(opt);
                });
            } catch (e) { console.error('load game list error:', e); }
        }

        /* ── 游戏专属设置 ── */
        async function loadGameSettings(gameId) {
            const panel = document.getElementById('gameSettingsPanel');
            if (!gameId) { panel.style.display = 'none'; return; }
            panel.style.display = 'block';
            try {
                const resp = await fetch(`/api/settings/game/${encodeURIComponent(gameId)}`);
                const data = await resp.json();
                if (data.volume) {
                    document.getElementById('gameVolume').value = data.volume;
                    document.getElementById('gameVolumeValue').textContent = data.volume;
                }
            } catch (e) { console.error('load game settings error:', e); }
        }

        async function saveCurrentGameSettings() {
            const gameId = document.getElementById('gameSelect').value;
            if (!gameId) return;
            const volume = document.getElementById('gameVolume').value;
            try {
                const resp = await fetch(`/api/settings/game/${encodeURIComponent(gameId)}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({volume})
                });
                if (resp.ok) alert('游戏设置已保存');
            } catch (e) { console.error('save game settings error:', e); }
        }

        /* ── 初始化 ── */
        document.addEventListener('DOMContentLoaded', () => {
            loadGlobalSettings();
            loadGameList();
        });
    </script>
</body>
</html>
